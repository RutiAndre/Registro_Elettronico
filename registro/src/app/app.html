<nav style="background: #2c3e50; padding: 10px; color: white; display: flex; justify-content: space-between;">
  <div>
    <strong>REGISTRO ELETTRONICO</strong>
  </div>

  <div>
    @if (auth.isLoggedIn()) {
      <span>Utente: <b>{{ auth.getUsername() }}</b></span>
      <button (click)="auth.logout()" style="margin-left: 15px;">Esci</button>
    } @else {
      <button (click)="auth.login()">Entra</button>
    }
  </div>
</nav>

<main style="padding: 20px;">
  <router-outlet></router-outlet>
</main>
